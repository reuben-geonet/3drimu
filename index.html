<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="3D RIMU map showing live GeoNet site health markers."
    />
    <title>RIMU 3D Map</title>
    <style>
      :root {
        background: #05070a;
        color: #f5f7fb;
      }

      body {
        margin: 0;
        background: #05070a;
      }

      .hud {
        display: none;
      }

      .loading-overlay {
        position: fixed;
        z-index: 10;
        inset: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #05070a;
        color: #f5f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .loading-overlay.is-hidden {
        visibility: hidden;
        opacity: 0;
      }

      .loader-shell {
        font-size: 1rem;
        font-weight: 650;
        letter-spacing: 0.02em;
      }

      .loading-copy {
        display: inline-flex;
        align-items: baseline;
        margin: 0;
      }

      .loading-dots {
        display: inline-grid;
        width: 1.05em;
        grid-template-columns: repeat(3, 0.35em);
        text-align: left;
      }

      .loading-dots span:nth-child(2) {
        opacity: 0;
        animation: loading-dot-two 1.2s steps(1, end) infinite;
      }

      .loading-dots span:nth-child(3) {
        opacity: 0;
        animation: loading-dot-three 1.2s steps(1, end) infinite;
      }

      @keyframes loading-dot-two {
        0%,
        33% {
          opacity: 0;
        }

        34%,
        100% {
          opacity: 1;
        }
      }

      @keyframes loading-dot-three {
        0%,
        66% {
          opacity: 0;
        }

        67%,
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div id="scene-root" aria-label="3D RIMU extruded world map"></div>

      <section class="hud hud-top" aria-label="RIMU map controls">
        <div class="toolbar">
          <button
            id="theme-toggle"
            class="control-button"
            type="button"
            data-testid="theme-toggle"
            aria-label="Switch to light mode"
          >
            <span class="control-icon" aria-hidden="true"></span>
            <span class="control-label">Light</span>
          </button>
          <button
            id="reset-view"
            class="control-button"
            type="button"
            aria-label="Reset view"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M4 8v-2a2 2 0 0 1 2 -2h2" />
                <path d="M4 16v2a2 2 0 0 0 2 2h2" />
                <path d="M16 4h2a2 2 0 0 1 2 2v2" />
                <path d="M16 20h2a2 2 0 0 0 2 -2v-2" />
              </svg>
            </span>
            <span class="control-label">Reset View</span>
          </button>
          <button
            id="refresh-data"
            class="control-button"
            type="button"
            aria-label="Refresh telemetry"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
                <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
              </svg>
            </span>
            <span class="control-label">Refresh</span>
          </button>
          <button
            id="auto-refresh"
            class="control-button"
            type="button"
            data-testid="auto-refresh"
            aria-label="Enable auto refresh"
            aria-pressed="false"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon auto-refresh-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <g class="auto-refresh-arrows">
                  <path d="M7.2 7.4a6.7 6.7 0 0 1 10.5 1.3" />
                  <path d="M17.8 5.3v3.4h-3.4" />
                  <path d="M16.8 16.6a6.7 6.7 0 0 1 -10.5 -1.3" />
                  <path d="M6.2 18.7v-3.4h3.4" />
                </g>
                <path
                  class="auto-refresh-pulse"
                  d="M12 12m-1.35 0a1.35 1.35 0 1 0 2.7 0a1.35 1.35 0 1 0 -2.7 0"
                />
              </svg>
            </span>
            <span class="control-label">Auto Refresh</span>
          </button>
          <button
            id="toggle-links"
            class="control-button is-active"
            type="button"
            data-testid="toggle-links"
            aria-label="Hide radio links"
            aria-pressed="true"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon radio-link-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path class="radio-mast" d="M12 19v-7" />
                <path class="radio-node" d="M12 12m-1.6 0a1.6 1.6 0 1 0 3.2 0a1.6 1.6 0 1 0 -3.2 0" />
                <path class="radio-wave radio-wave-a" d="M8.5 9.5a5 5 0 0 0 0 5" />
                <path class="radio-wave radio-wave-b" d="M15.5 9.5a5 5 0 0 1 0 5" />
                <path class="radio-wave radio-wave-c" d="M5.7 7a8.8 8.8 0 0 0 0 10" />
                <path class="radio-wave radio-wave-d" d="M18.3 7a8.8 8.8 0 0 1 0 10" />
              </svg>
            </span>
            <span class="control-label">Radio Links</span>
          </button>
          <button
            id="demo-mode"
            class="control-button"
            type="button"
            data-testid="demo-mode"
            aria-label="Start demo loop"
            aria-pressed="false"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon demo-mode-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path class="demo-play" d="M10 8.2l5.8 3.8l-5.8 3.8z" />
                <path class="demo-pause demo-pause-a" d="M9.4 8.3v7.4" />
                <path class="demo-pause demo-pause-b" d="M14.6 8.3v7.4" />
              </svg>
            </span>
            <span class="control-label">Demo Loop</span>
          </button>
          <button
            id="fullscreen-toggle"
            class="control-button"
            type="button"
            data-testid="fullscreen-toggle"
            aria-label="Enter fullscreen"
            aria-pressed="false"
          >
            <span class="control-icon" aria-hidden="true">
              <svg
                class="tabler-icon fullscreen-toggle-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <g class="fullscreen-expand">
                  <path d="M4 9v-3a2 2 0 0 1 2 -2h3" />
                  <path d="M20 9v-3a2 2 0 0 0 -2 -2h-3" />
                  <path d="M4 15v3a2 2 0 0 0 2 2h3" />
                  <path d="M20 15v3a2 2 0 0 1 -2 2h-3" />
                </g>
                <g class="fullscreen-compress">
                  <path d="M9 4v3a2 2 0 0 1 -2 2h-3" />
                  <path d="M15 4v3a2 2 0 0 0 2 2h3" />
                  <path d="M9 20v-3a2 2 0 0 0 -2 -2h-3" />
                  <path d="M15 20v-3a2 2 0 0 1 2 -2h3" />
                </g>
              </svg>
            </span>
            <span class="control-label">Fullscreen</span>
          </button>
        </div>
      </section>

      <section class="hud hud-status" aria-label="RIMU status filters">
        <div id="legend" class="legend"></div>
      </section>

      <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

      <section
        id="loading-overlay"
        class="loading-overlay"
        data-testid="loading-overlay"
        aria-label="Loading RIMU map"
      >
        <div class="loader-shell">
          <p id="loading-copy" class="loading-copy" aria-label="Loading">
            Loading<span class="loading-dots" aria-hidden="true"
              ><span>.</span><span>.</span><span>.</span></span
            >
          </p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
